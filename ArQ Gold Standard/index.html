<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArQ — Build More. Faster. Smarter.</title>
    <meta name="description" content="The execution system built for the people who actually build. Less paperwork, more progress. Book a demo now." />
    <meta name="author" content="ArQ AB" />

    <link rel="icon" type="image/svg+xml" href="/arq-favicon.svg" />

    <!--
      Pre-paint language resolver. Picks persisted choice → browser language → "en" fallback,
      then writes <html lang> and document.title before React hydrates.
      Mirrors resolveInitialLang() in src/contexts/LanguageContext.tsx — keep in sync.
    -->
    <script>
      (function () {
        try {
          var META = {
            sv: { title: "ArQ — Bygg mer. Snabbare. Smartare.", desc: "Exekveringssystemet för dig som faktiskt bygger. Mindre papper. Mer framsteg. Boka demo." },
            en: { title: "ArQ — Build More. Faster. Smarter.", desc: "The execution system built for the people who actually build. Less paperwork, more progress. Book a demo now." }
          };
          var stored = null;
          try { stored = localStorage.getItem("arq-lang"); } catch (e) {}
          var nav = (navigator.language || "").toLowerCase().split("-")[0];
          var lang = (stored === "sv" || stored === "en") ? stored
                   : (nav === "sv") ? "sv"
                   : "en";
          document.documentElement.lang = lang;
          document.title = META[lang].title;
          var d = document.querySelector('meta[name="description"]');
          if (d) d.setAttribute("content", META[lang].desc);
        } catch (e) { /* fail open to defaults */ }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.getarq.se" />
    <meta property="og:title" content="ArQ — Build More. Faster. Smarter." />
    <meta property="og:description" content="The execution system built for the people who actually build. Less paperwork, more progress." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArQ — Build More. Faster. Smarter." />
    <meta name="twitter:description" content="The execution system built for the people who actually build. Less paperwork, more progress." />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
